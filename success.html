<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nachricht gesendet – GG Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0A0A0A;
    color: #F0EDE6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    max-width: 520px;
    width: 100%;
    text-align: center;
    padding: 4rem 3rem;
    border: 1px solid rgba(201,168,76,0.18);
    background: #1A1A1A;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 3rem; right: 3rem; height: 2px;
    background: linear-gradient(to right, transparent, #C9A84C, transparent);
  }
  .icon {
    font-size: 3rem;
    margin-bottom: 1.5rem;
    display: block;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    margin-bottom: 1rem;
  }
  h1 em { font-style: italic; color: #C9A84C; }
  p {
    font-size: 0.95rem;
    font-weight: 300;
    color: #A8A49C;
    line-height: 1.8;
    margin-bottom: 2.5rem;
  }
  a {
    display: inline-block;
    background: #C9A84C;
    color: #0A0A0A;
    padding: 0.9rem 2.5rem;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.2s;
  }
  a:hover { background: #E8C97A; }
</style>
</head>
<body>
  <div class="card">
    <span class="icon">✓</span>
    <h1>Vielen <em>Dank!</em></h1>
    <p>
      Ihre Nachricht wurde erfolgreich gesendet.<br>
      Wir melden uns innerhalb von 24 Stunden bei Ihnen –
      auf Deutsch, Englisch oder Französisch.
    </p>
    <a href="/">Zurück zur Website</a>
  </div>
</body>
</html>
